<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control de aforo evento v2</title>
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet" />
  <style>
    :root, [data-theme="light"] {
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2rem);
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --radius-full: 9999px;
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      --color-bg: #f7f6f2;
      --color-surface: #f9f8f5;
      --color-surface-2: #fbfbf9;
      --color-border: #d4d1ca;
      --color-text: #28251d;
      --color-text-muted: #696760;
      --color-text-inverse: #f9f8f4;
      --color-primary: #01696f;
      --color-primary-hover: #0c4e54;
      --color-primary-highlight: #d7e8e7;
      --color-warning: #964219;
      --color-error: #a13544;
      --color-success: #437a22;
      --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06);
      --shadow-md: 0 8px 24px oklch(0.2 0.01 80 / 0.08);
      --font-body: 'Satoshi', Inter, sans-serif;
      --content: 1180px;
    }
    [data-theme="dark"] {
      --color-bg: #171614;
      --color-surface: #1c1b19;
      --color-surface-2: #201f1d;
      --color-border: #393836;
      --color-text: #ece8e1;
      --color-text-muted: #beb9b0;
      --color-text-inverse: #1a1816;
      --color-primary: #4f98a3;
      --color-primary-hover: #69aeb8;
      --color-primary-highlight: #243436;
      --color-warning: #c07a4a;
      --color-error: #dd6974;
      --color-success: #84be63;
      --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.22);
      --shadow-md: 0 8px 24px oklch(0 0 0 / 0.3);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: var(--font-body);
      font-size: var(--text-base);
      line-height: 1.5;
      background: var(--color-bg);
      color: var(--color-text);
    }
    button, input { font: inherit; }
    button { cursor: pointer; transition: all var(--transition); border: none; }
    button:active { transform: translateY(1px) scale(0.99); }
